<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Websites — AM World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Barlow:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      background: linear-gradient(to bottom, #b8d4e8 0%, #f5c9a0 45%, #f0a870 70%, #ffd59b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.4rem 2rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 100;
      background: rgba(255, 240, 220, 0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand { display: flex; flex-direction: column; gap: 0.35rem; }
    .brand-name { font-size: 1.15rem; font-weight: 700; color: #1c0e06; }

    nav { display: flex; gap: 1.75rem; align-items: center; padding-top: 0.15rem; }
    nav a {
      font-size: 0.88rem; font-weight: 600; text-decoration: none;
      color: #1c0e06; opacity: 0.6; transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }
    nav a.active { opacity: 1; }

    /* ── Loading card ── */
    .card {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .page-label {
      font-family: 'Barlow', system-ui, sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 8vw, 5rem);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: #fff8f0;
      text-shadow:
        1px 1px 0 #b05a10,
        2px 2px 0 #b05a10,
        3px 3px 0 #b05a10,
        4px 4px 0 #9a4e0c,
        6px 6px 16px rgba(0,0,0,0.2);
      margin-bottom: 0.5rem;
    }

    .loading-label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a4e28;
      margin-bottom: 1.25rem;
    }

    /* ── 3D Bar ── */
    .bar-wrap {
      width: 100%;
      position: relative;
      padding-top: 22px;   /* room for top face */
      padding-bottom: 16px; /* room for bottom face */
      margin-bottom: 1rem;
    }

    .bar-track {
      width: 100%;
      height: 34px;
      background: rgba(20, 8, 0, 0.20);
      border-radius: 2px;
      position: relative;
      overflow: visible;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      position: relative;
      overflow: visible;

      /* FRONT FACE */
      background: linear-gradient(to bottom,
        #ffd060 0%,
        #f5a020 18%,
        #e06820 55%,
        #b03010 85%,
        #8a2408 100%
      );

      /* BOTTOM FACE — solid stacked shadows */
      box-shadow:
        0  5px 0 #7a2010,
        0 10px 0 #621808,
        0 14px 0 #4e1206;
    }

    /* TOP FACE — skewed parallelogram going up-right */
    .bar-fill::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 22px;
      bottom: 100%;
      background: linear-gradient(to right,
        #ffe898,
        #f5c050,
        #e0a030
      );
      transform-origin: bottom left;
      transform: skewX(-45deg);
    }

    /* RIGHT END CAP — parallelogram connecting top face + front face */
    .bar-fill::after {
      content: '';
      position: absolute;
      left: 100%;
      top: -22px;
      width: 22px;
      height: calc(100% + 22px); /* 34px front + 22px top = 56px */
      background: linear-gradient(to bottom,
        #f0b040 0%,
        #c04020 38%,
        #7a1c0a 100%
      );
      /* Parallelogram: front-top(0,22px) → cap-top(22px,0) → cap-bottom(22px,34px) → front-bottom(0,56px) */
      clip-path: polygon(0 22px, 22px 0, 22px calc(100% - 22px), 0 100%);
    }

    .bar-pct {
      font-size: 0.82rem;
      font-weight: 700;
      color: #7a4e28;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .subtext {
      font-size: 0.9rem;
      color: #7a4e28;
      line-height: 1.6;
    }

    .back {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #7a4e28;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      transition: color 0.15s;
    }
    .back:hover { color: #1c0e06; }

    @media (max-width: 560px) {
      header { flex-direction: column; gap: 1rem; padding: 1.2rem 1.25rem; }
      nav { gap: 1.1rem; }
      nav a { font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-name">AM World 🌍</span>
    </div>
    <nav>
      <a href="/websites" class="active">Websites</a>
      <a href="/music">Music</a>
      <a href="/substack">Substack</a>
      <a href="/the-first-click/">TFC</a>
    </nav>
  </header>

  <div class="card">
    <div class="page-label">Websites</div>
    <div class="loading-label">Loading...</div>
    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>
    <div class="bar-pct" id="pct">0%</div>
    <p class="subtext">Something's being built here.<br>Check back soon.</p>
    <a href="/" class="back">← back to AM World</a>
  </div>

  <script>
    const bar = document.getElementById('bar');
    const pct = document.getElementById('pct');
    const TARGET = 98.9;
    let current = 0;

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    const duration = 8000;
    const start = performance.now();

    function animate(now) {
      const elapsed = now - start;
      const t = Math.min(elapsed / duration, 1);
      current = easeOut(t) * TARGET;

      bar.style.width = current + '%';
      pct.textContent = current.toFixed(1) + '%';

      if (current < TARGET) {
        requestAnimationFrame(animate);
      } else {
        bar.style.width = TARGET + '%';
        pct.textContent = TARGET + '%';
        // Subtle pulse at 98.9% — almost there, forever
        bar.style.boxShadow = '0 0 18px rgba(240, 120, 40, 0.8)';
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
