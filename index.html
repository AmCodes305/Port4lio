<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Barlow:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* ─────────────────────────────────────────
       BACKGROUND LAYERS
    ───────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 3s ease-in-out;
    }
    .bg.active { opacity: 1; }

    #bg-sunrise {
      background: linear-gradient(to bottom,
        #b8d4e8 0%,
        #d4e9f5 15%,
        #f5c9a0 45%,
        #f0a870 70%,
        #ffd59b 100%
      );
    }

    #bg-sunset {
      background: linear-gradient(to bottom,
        #2e0d1a 0%,
        #7a1830 20%,
        #c03b28 45%,
        #e06820 70%,
        #f5a020 100%
      );
    }

    #bg-night {
      background: linear-gradient(to bottom,
        #030508 0%,
        #080f1e 30%,
        #0a1e30 60%,
        #061420 100%
      );
    }

    /* ─────────────────────────────────────────
       STARS
    ───────────────────────────────────────── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0;
      transition: opacity 3s ease-in-out;
      pointer-events: none;
    }
    #stars.active { opacity: 1; }

    /* Generated star field via multiple radial gradients */
    #stars::before,
    #stars::after {
      content: '';
      position: absolute;
      inset: 0;
    }
    #stars::before {
      background-image:
        radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 18%  5%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 28% 20%, rgba(255,255,255,0.95) 0%, transparent 100%),
        radial-gradient(1px 1px at 38%  9%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 16%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 62%  4%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 22%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 83%  8%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 18%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at  4% 35%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 42%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 48%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 38%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 58% 32%, rgba(255,255,255,0.95) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 45%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 36%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 50%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 96% 40%, rgba(255,255,255,0.85) 0%, transparent 100%);
    }
    #stars::after {
      background-image:
        radial-gradient(1px 1px at 12% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 55%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 33% 65%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 58%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 62%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 72%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 58%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at  6% 78%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 82%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 88%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 80%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 85%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 76%, rgba(255,255,255,0.8) 0%, transparent 100%);
    }

    /* ─────────────────────────────────────────
       AURORA BOREALIS
    ───────────────────────────────────────── */
    #aurora {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0;
      transition: opacity 3s ease-in-out;
      pointer-events: none;
      overflow: hidden;
    }
    #aurora.active { opacity: 1; }

    .aurora-band {
      position: absolute;
      left: -10%;
      width: 120%;
      border-radius: 50%;
      filter: blur(55px);
    }

    .aurora-band:nth-child(1) {
      top: 5%;
      height: 200px;
      background: radial-gradient(ellipse 80% 50% at 50% 50%,
        rgba(20, 210, 130, 0.75) 0%,
        rgba(0,  180, 100, 0.35) 50%,
        transparent 80%);
      animation: aurora1 13s ease-in-out infinite alternate;
    }

    .aurora-band:nth-child(2) {
      top: 16%;
      height: 160px;
      background: radial-gradient(ellipse 70% 50% at 50% 50%,
        rgba(0, 230, 170, 0.55) 0%,
        rgba(0, 200, 140, 0.20) 50%,
        transparent 80%);
      animation: aurora2 17s ease-in-out infinite alternate;
    }

    .aurora-band:nth-child(3) {
      top: 26%;
      height: 120px;
      background: radial-gradient(ellipse 90% 50% at 50% 50%,
        rgba(80, 220, 200, 0.45) 0%,
        rgba(40, 190, 170, 0.15) 50%,
        transparent 80%);
      animation: aurora3 11s ease-in-out infinite alternate;
    }

    .aurora-band:nth-child(4) {
      top: 10%;
      height: 240px;
      background: radial-gradient(ellipse 60% 50% at 60% 50%,
        rgba(0, 180, 120, 0.30) 0%,
        rgba(0, 150,  90, 0.10) 50%,
        transparent 80%);
      animation: aurora4 19s ease-in-out infinite alternate;
    }

    @keyframes aurora1 {
      0%   { transform: translateX(0%)   scaleY(1.00); }
      25%  { transform: translateX(6%)   scaleY(1.20); }
      60%  { transform: translateX(-4%)  scaleY(0.85); }
      100% { transform: translateX(10%)  scaleY(1.15); }
    }
    @keyframes aurora2 {
      0%   { transform: translateX(0%)   scaleY(1.00); }
      30%  { transform: translateX(-8%)  scaleY(1.30); }
      65%  { transform: translateX(5%)   scaleY(0.90); }
      100% { transform: translateX(-12%) scaleY(1.10); }
    }
    @keyframes aurora3 {
      0%   { transform: translateX(0%)   scaleY(1.00); }
      40%  { transform: translateX(9%)   scaleY(0.80); }
      70%  { transform: translateX(-6%)  scaleY(1.25); }
      100% { transform: translateX(14%)  scaleY(0.95); }
    }
    @keyframes aurora4 {
      0%   { transform: translateX(0%)   scaleY(1.00); }
      35%  { transform: translateX(-10%) scaleY(1.40); }
      70%  { transform: translateX(7%)   scaleY(0.75); }
      100% { transform: translateX(-5%)  scaleY(1.20); }
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.4rem 2rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 100;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* Per-phase header tint */
    body.phase-sunrise header { background: rgba(255, 240, 220, 0.25); }
    body.phase-sunset  header { background: rgba(20,   5,  10, 0.30); }
    body.phase-night   header { background: rgba(5,   10,  20, 0.40); }

    /* Per-phase text colours */
    body.phase-sunrise { --c-text: #1c0e06; --c-muted: #7a4e28; }
    body.phase-sunset  { --c-text: #fff0e0; --c-muted: #f5c9a0; }
    body.phase-night   { --c-text: #d8f0ec; --c-muted: #7ecfc0; }

    .brand { display: flex; flex-direction: column; gap: 0.35rem; }

    .brand-name {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--c-text, #1c0e06);
      transition: color 3s ease-in-out;
    }

    .typewriter {
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--c-muted, #7a4e28);
      min-height: 1.3em;
      transition: color 3s ease-in-out;
    }

    .cursor {
      display: inline-block;
      margin-left: 1px;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    nav {
      display: flex;
      gap: 1.75rem;
      align-items: center;
      padding-top: 0.15rem;
    }

    nav a {
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--c-text, #1c0e06);
      opacity: 0.6;
      transition: opacity 0.15s, color 3s ease-in-out;
    }
    nav a:hover { opacity: 1; }

    /* ─────────────────────────────────────────
       HERO
    ───────────────────────────────────────── */
    main {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 2rem;
      text-align: center;
    }

    .quote-text {
      font-family: 'Barlow', 'Inter', system-ui, sans-serif;
      font-style: normal;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 6rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 900px;
      text-transform: uppercase;
      transition: color 3s ease-in-out, text-shadow 3s ease-in-out;
    }

    body.phase-sunrise .quote-text {
      color: #fff8f0;
      text-shadow:
        1px 1px 0 #b05a10,
        2px 2px 0 #b05a10,
        3px 3px 0 #b05a10,
        4px 4px 0 #b05a10,
        5px 5px 0 #9a4e0c,
        6px 6px 0 #9a4e0c,
        8px 8px 18px rgba(0,0,0,0.25);
    }
    body.phase-sunset .quote-text {
      color: #fff5e0;
      text-shadow:
        1px 1px 0 #6b1a0a,
        2px 2px 0 #6b1a0a,
        3px 3px 0 #6b1a0a,
        4px 4px 0 #6b1a0a,
        5px 5px 0 #501208,
        6px 6px 0 #501208,
        8px 8px 18px rgba(0,0,0,0.45);
    }
    body.phase-night .quote-text {
      color: #e0faf4;
      text-shadow:
        1px 1px 0 #006644,
        2px 2px 0 #006644,
        3px 3px 0 #006644,
        4px 4px 0 #006644,
        5px 5px 0 #004d33,
        6px 6px 0 #004d33,
        8px 8px 24px rgba(0, 200, 140, 0.4);
    }

    /* ─────────────────────────────────────────
       MOBILE
    ───────────────────────────────────────── */
    @media (max-width: 560px) {
      header {
        flex-direction: column;
        gap: 1rem;
        padding: 1.2rem 1.25rem;
      }
      nav {
        gap: 1.1rem;
        flex-wrap: nowrap;
      }
      nav a { font-size: 0.82rem; }
    }
  </style>
</head>
<body class="phase-sunrise">

  <!-- ── Backgrounds ── -->
  <div class="bg active" id="bg-sunrise"></div>
  <div class="bg"        id="bg-sunset"></div>
  <div class="bg"        id="bg-night"></div>

  <!-- ── Stars (night only) ── -->
  <div id="stars"></div>

  <!-- ── Aurora (night only) ── -->
  <div id="aurora">
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
  </div>

  <!-- ── Header ── -->
  <header>
    <div class="brand">
      <a href="/" class="brand-name">AM World <span id="globe">🌍</span></a>
      <div class="typewriter"><span id="typed"></span><span class="cursor">|</span></div>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/websites">Websites</a>
      <a href="/music">Music</a>
      <a href="/substack">Substack</a>
      <a href="/the-first-click/">TFC</a>
    </nav>
  </header>

  <!-- ── Hero ── -->
  <main>
    <p class="quote-text">
      "We walk the trail not for the summit,<br>but for the journey"
    </p>
  </main>

  <script>
    // ── Globe spinner ──
    const globeEl = document.getElementById('globe');
    const globes  = ['🌍', '🌎', '🌏'];
    let gi = 0;
    setInterval(() => { globeEl.textContent = globes[gi = (gi + 1) % 3]; }, 180);

    // ── Typewriter ──
    const phrases = [
      'researching',
      'exploring the world',
      'one step at a time',
      'living in the moment',
      'holding space',
      'spending time with family',
      'practicing self-discipline',
      'learning',
      "you're not alone",
      'persevering',
      'being yourself',
    ];
    const typedEl = document.getElementById('typed');
    let pi = 0, ci = 0, deleting = false;
    function tick() {
      const phrase = phrases[pi];
      if (!deleting) {
        typedEl.textContent = phrase.slice(0, ++ci);
        if (ci === phrase.length) { deleting = true; return setTimeout(tick, 1800); }
        setTimeout(tick, 85);
      } else {
        typedEl.textContent = phrase.slice(0, --ci);
        if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; return setTimeout(tick, 320); }
        setTimeout(tick, 42);
      }
    }
    tick();

    // ── Background phase cycle ──
    const phases = [
      { id: 'bg-sunrise', bodyClass: 'phase-sunrise', stars: false, aurora: false },
      { id: 'bg-sunset',  bodyClass: 'phase-sunset',  stars: false, aurora: false },
      { id: 'bg-night',   bodyClass: 'phase-night',   stars: true,  aurora: true  },
    ];

    const bgEls    = phases.map(p => document.getElementById(p.id));
    const starsEl  = document.getElementById('stars');
    const auroraEl = document.getElementById('aurora');

    let current = 0;

    function applyPhase(idx) {
      const p = phases[idx];

      // Swap backgrounds
      bgEls.forEach((el, i) => el.classList.toggle('active', i === idx));

      // Stars & aurora
      starsEl.classList.toggle('active',  p.stars);
      auroraEl.classList.toggle('active', p.aurora);

      // Body class for text colours
      document.body.className = p.bodyClass;
    }

    // Each phase holds for 10 s, transitions take 3 s (CSS)
    setInterval(() => {
      current = (current + 1) % phases.length;
      applyPhase(current);
    }, 10000);
  </script>
</body>
</html>
